name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_PORT: 3000
  TEST_URLS: |
    /
    /api/boards

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t wklejka:test .

      - name: Run container
        run: docker run -d --name app -p "${{ env.APP_PORT }}:${{ env.APP_PORT }}" wklejka:test

      - name: Wait until all endpoints return 200
        run: |
          set -euo pipefail
          base="http://localhost:${{ env.APP_PORT }}"
          IFS=$'\n' read -r -d '' -a URLS < <(printf '%s\0' "${{ env.TEST_URLS }}")
          echo "Checking ${#URLS[@]} endpoint(s)..."

          wait_for_200() {
            local url="$1"
            echo "→ Waiting for 200 from: $url"
            for i in $(seq 1 30); do
              if curl -fsS --max-time 2 "$url" > /dev/null; then
                echo "✅ 200 from: $url"
                return 0
              fi
              sleep 1
            done
            echo "❌ No 200 response within 30s from: $url"
            return 1
          }

          failures=0
          for raw in "${URLS[@]}"; do
            url="${base}${raw}"
            if ! wait_for_200 "$url"; then
              failures=$((failures+1))
            fi
          done

          if [[ $failures -gt 0 ]]; then
            echo "Container logs:"
            docker logs app || true
            exit 1
          fi
          echo "All endpoints responded with 200"

      - name: Smoke test clip creation
        run: |
          set -euo pipefail
          base="http://localhost:${{ env.APP_PORT }}"

          curl -fsS -X POST "${base}/api/boards/default/clips" \
            -H 'Content-Type: application/json' \
            -d '{"type":"text","content":"ci test"}' | grep -q '"type":"text"'

          curl -fsS "${base}/api/boards/default/clips" | grep -q '"ci test"'

          # File upload
          curl -fsS -X POST "${base}/api/boards/default/clips" \
            -H 'Content-Type: application/json' \
            -d '{"type":"file","content":"data:text/plain;base64,aGVsbG8=","originalName":"test.txt"}' | grep -q '"type":"file"'

          # Board with expiration
          curl -fsS -X POST "${base}/api/boards" \
            -H 'Content-Type: application/json' \
            -d '{"name":"temp","expiresIn":3600000}' | grep -q '"expiresAt"'

          echo "Smoke test passed"

      - name: Smoke test board rename, reorder, and lock
        run: |
          set -euo pipefail
          base="http://localhost:${{ env.APP_PORT }}"

          # Create two boards
          BOARD_A=$(curl -fsS -X POST "${base}/api/boards" \
            -H 'Content-Type: application/json' \
            -d '{"name":"Board A"}')
          BOARD_B=$(curl -fsS -X POST "${base}/api/boards" \
            -H 'Content-Type: application/json' \
            -d '{"name":"Board B"}')
          ID_A=$(echo "$BOARD_A" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          ID_B=$(echo "$BOARD_B" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)

          # Rename board
          curl -fsS -X PUT "${base}/api/boards/${ID_A}" \
            -H 'Content-Type: application/json' \
            -d '{"name":"Renamed A"}' | grep -q '"Renamed A"'

          # Reorder boards
          curl -fsS -X PUT "${base}/api/boards/reorder" \
            -H 'Content-Type: application/json' \
            -d "{\"ids\":[\"default\",\"${ID_B}\",\"${ID_A}\"]}" | grep -q '"ok"'

          # Lock board
          curl -fsS -X PUT "${base}/api/boards/${ID_A}" \
            -H 'Content-Type: application/json' \
            -d '{"locked":true}' | grep -q '"locked":true'

          # Delete locked board should fail (403)
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' -X DELETE "${base}/api/boards/${ID_A}")
          [ "$HTTP_CODE" = "403" ] || { echo "Expected 403, got $HTTP_CODE"; exit 1; }

          # Add clip to locked board, then try to delete it (403)
          CLIP=$(curl -fsS -X POST "${base}/api/boards/${ID_A}/clips" \
            -H 'Content-Type: application/json' \
            -d '{"type":"text","content":"locked clip"}')
          CLIP_ID=$(echo "$CLIP" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' -X DELETE "${base}/api/boards/${ID_A}/clips/${CLIP_ID}")
          [ "$HTTP_CODE" = "403" ] || { echo "Expected 403, got $HTTP_CODE"; exit 1; }

          # Unlock and delete should work
          curl -fsS -X PUT "${base}/api/boards/${ID_A}" \
            -H 'Content-Type: application/json' \
            -d '{"locked":false}' | grep -q '"locked":false'
          curl -fsS -X DELETE "${base}/api/boards/${ID_A}" | grep -q '"ok"'

          echo "Board rename, reorder, and lock tests passed"

      - name: Smoke test link preview
        run: |
          set -euo pipefail
          base="http://localhost:${{ env.APP_PORT }}"

          # Should return JSON (even if title is empty for non-HTML)
          curl -fsS "${base}/api/link-preview?url=https://example.com" | grep -q '"title"'

          # Invalid URL should return 400
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' "${base}/api/link-preview?url=notaurl")
          [ "$HTTP_CODE" = "400" ] || { echo "Expected 400, got $HTTP_CODE"; exit 1; }

          echo "Link preview tests passed"

      - name: Clean up
        if: always()
        run: docker rm -f app || true

  publish:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push image
        run: |
          set -e
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          REPO="${GITHUB_REPOSITORY#*/}"
          IMAGE="ghcr.io/${OWNER}/${REPO}"
          SHA_TAG="sha-$(git rev-parse --short HEAD)"

          docker build -t "${IMAGE}:${SHA_TAG}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${SHA_TAG}"
          docker push "${IMAGE}:latest"
